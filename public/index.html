<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avo Chatbot Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .chatbot-container {
      width: 390px;
      height: 680px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(14,18,30,0.98) 0%, rgba(8,10,18,0.99) 100%);
      border: 1px solid rgba(120, 130, 255, 0.18);
      box-shadow:
        0 24px 80px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 0 30px rgba(94, 92, 255, 0.12);
    }

    .chatbot-header {
      padding: 18px 18px 14px;
      background:
        radial-gradient(circle at top left, rgba(95,55,216,0.32) 0%, rgba(95,55,216,0.08) 28%, rgba(17,24,39,0.96) 62%),
        linear-gradient(180deg, rgba(20,26,42,0.98) 0%, rgba(13,17,30,0.98) 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .chatbot-header h3 {
      margin: 0 0 6px 0;
      font-size: 18px;
      font-weight: 700;
      color: #f5f7ff;
    }

    .chatbot-header p {
      margin: 0;
      font-size: 13px;
      color: rgba(214,221,255,0.72);
    }

    .chatbot-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background:
        radial-gradient(circle at top left, rgba(79,70,229,0.08) 0%, transparent 28%),
        linear-gradient(180deg, #090d17 0%, #06080f 100%);
    }

    .message {
      max-width: 84%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
      white-space: pre-wrap;
    }

    .bot {
      align-self: flex-start;
      color: #e8ecff;
      background:
        linear-gradient(180deg, rgba(21,26,39,0.96) 0%, rgba(15,19,30,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .user {
      align-self: flex-end;
      color: #ffffff;
      background:
        linear-gradient(135deg, #5f37d8 0%, #4f46e5 55%, #3b82f6 100%);
    }

    .typing {
      align-self: flex-start;
      display: inline-flex;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(21,26,39,0.96) 0%, rgba(15,19,30,0.98) 100%);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(232,236,255,0.7);
      animation: bounce 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%,80%,100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .chatbot-input {
      display: flex;
      gap: 10px;
      padding: 14px;
      background: #0b0f19;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .chatbot-input input {
      flex: 1;
      border: 1px solid rgba(130,145,255,0.16);
      background: rgba(255,255,255,0.03);
      color: #f3f6ff;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    .chatbot-input button {
      border: none;
      color: white;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 14px;
      cursor: pointer;
      background:
        linear-gradient(135deg, #5f37d8 0%, #4f46e5 60%, #3b82f6 100%);
    }
  </style>
</head>
<body>
  <div class="chatbot-container">
    <div class="chatbot-header">
      <h3>You are talking with Avo</h3>
      <p>Ask anything</p>
    </div>

    <div class="chatbot-messages" id="messages"></div>

    <div class="chatbot-input">
      <input id="userInput" placeholder="Type your message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, sender) {
      const m = document.createElement("div");
      m.className = "message " + sender;
      m.innerText = text;
      messages.appendChild(m);
      messages.scrollTop = messages.scrollHeight;
    }

    function typing() {
      const t = document.createElement("div");
      t.className = "typing";
      t.id = "typing";
      t.innerHTML = "<span></span><span></span><span></span>";
      messages.appendChild(t);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function botSequence(parts) {
      for (let p of parts) {
        typing();
        await sleep(700);
        removeTyping();
        addMessage(p, "bot");
        await sleep(350);
      }
    }

    async function sendMessage(text) {
      addMessage(text, "user");

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          message: text,
          page: "homepage",
          isLoggedIn: false
        })
      });

      const data = await res.json();

      const parts = data.reply.split("\n\n");
      botSequence(parts);
    }

    sendBtn.onclick = () => {
      if (!input.value) return;
      const text = input.value;
      input.value = "";
      sendMessage(text);
    };

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        sendBtn.onclick();
      }
    });

    botSequence([
      "Want me to show you how this works?"
    ]);
  </script>
</body>
</html>
